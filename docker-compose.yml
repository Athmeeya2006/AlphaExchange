# trade-eval-platform docker-compose - local development stack
# Start infrastructure: docker compose up -d kafka redis minio timescaledb postgres
# Init one-shots:       docker compose up kafka-init minio-init
#
# Every service gets the shared dev environment below. Values can be overridden
# through a .env file in this directory; without one the defaults work as-is,
# so the stack runs from a fresh clone (and in CI) with no extra setup.

x-dev-env: &dev-env
  KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
  BUILD_JOBS_TOPIC: ${BUILD_JOBS_TOPIC:-build-jobs}
  ORCHESTRATOR_EVENTS_TOPIC: ${ORCHESTRATOR_EVENTS_TOPIC:-orchestrator-events}
  BOT_TELEMETRY_TOPIC: ${BOT_TELEMETRY_TOPIC:-bot-telemetry}
  LEADERBOARD_UPDATES_TOPIC: ${LEADERBOARD_UPDATES_TOPIC:-leaderboard-updates}
  SUBMISSIONS_TOPIC: ${SUBMISSIONS_TOPIC:-submissions}
  REDIS_URL: ${REDIS_URL:-redis:6379}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-submissions}
  MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
  TIMESCALE_DSN: ${TIMESCALE_DSN:-postgres://postgres:postgres@timescaledb:5432/tradeeval?sslmode=disable}
  # In-network DSN; deliberately not read from .env, whose value targets the
  # host-mapped port (5433) and is wrong inside a container.
  ORCHESTRATOR_DB_DSN: postgres://postgres:postgres@postgres:5432/orchestrator?sslmode=disable
  SUBMISSION_API_PORT: ${SUBMISSION_API_PORT:-8080}
  MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
  MAX_CONCURRENT_BUILDS: ${MAX_CONCURRENT_BUILDS:-3}
  BUILD_TIMEOUT_SECONDS: ${BUILD_TIMEOUT_SECONDS:-120}
  WORK_DIR: ${WORK_DIR:-/tmp/builds}
  HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-10}
  ORPHAN_DETECTION_SECONDS: ${ORPHAN_DETECTION_SECONDS:-60}
  AUTO_TRIGGER_TESTS: ${AUTO_TRIGGER_TESTS:-false}
  MAX_BOTS_PER_POD: ${MAX_BOTS_PER_POD:-200}
  BOT_REQUEST_TIMEOUT_MS: ${BOT_REQUEST_TIMEOUT_MS:-5000}
  TEST_DEFAULT_DURATION_SECONDS: ${TEST_DEFAULT_DURATION_SECONDS:-300}
  TEST_DEFAULT_BOT_COUNT: ${TEST_DEFAULT_BOT_COUNT:-500}
  WINDOW_SIZE_SECONDS: ${WINDOW_SIZE_SECONDS:-30}
  TELEMETRY_BATCH_SIZE: ${TELEMETRY_BATCH_SIZE:-500}
  FLUSH_INTERVAL_MS: ${FLUSH_INTERVAL_MS:-1000}
  REORDER_BUFFER_MS: ${REORDER_BUFFER_MS:-100}
  LEADERBOARD_API_PORT: ${LEADERBOARD_API_PORT:-8084}
  LEADERBOARD_UPDATE_INTERVAL_MS: ${LEADERBOARD_UPDATE_INTERVAL_MS:-500}
  MAX_WEBSOCKET_CONNECTIONS: ${MAX_WEBSOCKET_CONNECTIONS:-10000}
  SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-512m}
  SANDBOX_CPU_CORES: ${SANDBOX_CPU_CORES:-2,3}
  CONTESTANT_NETWORK: ${CONTESTANT_NETWORK:-alphaexchange_trade-eval-net}
  ADMIN_API_KEY: ${ADMIN_API_KEY:-admin-dev-key-change-in-production}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-internal-dev-token}

services:

  # ── Kafka (KRaft mode - no Zookeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trade-eval-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD", "/bin/kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - trade-eval-net

  # ── Kafka Init (one-shot topic creation) ───────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trade-eval-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command: >
      /bin/bash -c "
        echo 'Waiting for Kafka to be ready...'
        /bin/kafka-topics --bootstrap-server kafka:9092 --list

        echo 'Creating topics...'
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic submissions --partitions 4 --replication-factor 1
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic build-jobs --partitions 4 --replication-factor 1
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orchestrator-events --partitions 4 --replication-factor 1
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic bot-telemetry --partitions 16 --replication-factor 1
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic leaderboard-updates --partitions 2 --replication-factor 1
        /bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic telemetry-anomalies --partitions 2 --replication-factor 1

        echo 'All topics created.'
        /bin/kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - trade-eval-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: trade-eval-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - trade-eval-net

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: trade-eval-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data
    networks:
      - trade-eval-net

  # ── MinIO Init (one-shot bucket creation) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: trade-eval-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/submissions &&
        echo 'MinIO bucket created.'
      "
    networks:
      - trade-eval-net

  # ── TimescaleDB (telemetry + time-series data) ────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trade-eval-timescaledb
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeeval
    command: postgres -c shared_preload_libraries=timescaledb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeeval -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - trade-eval-net

  # ── Postgres (orchestrator state DB) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trade-eval-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orchestrator -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - trade-eval-net

  # ── DB migrate (one-shot: applies SQL to both databases) ───────────────────
  db-migrate:
    image: postgres:16-alpine
    container_name: trade-eval-db-migrate
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./services/telemetry-ingester/migrations:/migrations/timescale:ro
      - ./services/orchestrator/migrations:/migrations/orchestrator:ro
      - ./scripts/local-dev/seed.sql:/seed.sql:ro
    entrypoint: >
      /bin/sh -c "
        set -e
        until pg_isready -h timescaledb -p 5432 -U postgres -d tradeeval; do echo 'waiting for timescaledb'; sleep 2; done
        until pg_isready -h postgres -p 5432 -U postgres -d orchestrator; do echo 'waiting for postgres'; sleep 2; done
        for f in $$(ls /migrations/timescale/*.sql | sort); do
          echo applying $$f; psql 'postgres://postgres:postgres@timescaledb:5432/tradeeval?sslmode=disable' -v ON_ERROR_STOP=1 -f $$f;
        done
        for f in $$(ls /migrations/orchestrator/*.sql | sort); do
          echo applying $$f; psql 'postgres://postgres:postgres@postgres:5432/orchestrator?sslmode=disable' -v ON_ERROR_STOP=1 -f $$f;
        done
        psql 'postgres://postgres:postgres@postgres:5432/orchestrator?sslmode=disable' -f /seed.sql || true
        echo 'migrations + seed complete'
      "
    networks:
      - trade-eval-net

  # ── Submission API ─────────────────────────────────────────────────────────
  submission-api:
    build: ./services/submission-api
    container_name: trade-eval-submission-api
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - trade-eval-net

  # ── Build Worker ───────────────────────────────────────────────────────────
  build-worker:
    build: ./services/build-worker
    container_name: trade-eval-build-worker
    user: root
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      SECCOMP_PROFILE: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/docker/contestant/seccomp:/seccomp:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks:
      - trade-eval-net

  # ── Orchestrator ───────────────────────────────────────────────────────────
  orchestrator:
    build: ./services/orchestrator
    container_name: trade-eval-orchestrator
    ports:
      - "8082:8082"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      HEALTH_PORT: "8082"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trade-eval-net

  # ── Bot Fleet ──────────────────────────────────────────────────────────────
  bot-fleet:
    build: ./services/bot-fleet
    container_name: trade-eval-bot-fleet
    ports:
      - "8085:8082"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      METRICS_PORT: "8082"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - trade-eval-net

  # ── Telemetry Ingester ─────────────────────────────────────────────────────
  telemetry-ingester:
    build: ./services/telemetry-ingester
    container_name: trade-eval-telemetry-ingester
    ports:
      - "8083:8083"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      API_PORT: "8083"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trade-eval-net

  # ── Leaderboard API ────────────────────────────────────────────────────────
  leaderboard-api:
    build: ./services/leaderboard-api
    container_name: trade-eval-leaderboard-api
    ports:
      - "8084:8084"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *dev-env
      PORT: "8084"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trade-eval-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: trade-eval-frontend
    ports:
      - "3000:80"
    depends_on:
      - submission-api
      - leaderboard-api
    networks:
      - trade-eval-net

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  trade-eval-net:
    driver: bridge
  contestant-isolated:
    driver: bridge
    internal: true

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
  redis-data:
  minio-data:
  timescaledb-data:
  postgres-data:
