worker_processes auto;
events { worker_connections 4096; }
http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/m;

  upstream submission_api { server submission-api:8080; }
  upstream leaderboard_api { server leaderboard-api:8084; }

  server {
    listen 80;

    location /ws {
      limit_req zone=ws burst=5 nodelay;
      proxy_pass http://leaderboard_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }
    location /v1 {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://submission_api;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
