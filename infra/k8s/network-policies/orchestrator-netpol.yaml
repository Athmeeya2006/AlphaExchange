apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator
  namespace: trade-eval
spec:
  podSelector:
    matchLabels:
      app: orchestrator
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: trade-eval
  egress:
    # Kafka
    - to: []
      ports:
        - { protocol: TCP, port: 9092 }
    # Redis
    - to: []
      ports:
        - { protocol: TCP, port: 6379 }
    # Postgres (orchestrator DB)
    - to: []
      ports:
        - { protocol: TCP, port: 5433 }
    # DNS
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
