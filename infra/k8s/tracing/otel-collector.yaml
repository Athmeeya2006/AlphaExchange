apiVersion: v1
kind: ConfigMap
metadata: { name: otel-collector-config, namespace: tracing }
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
    exporters:
      otlp:
        endpoint: jaeger:4317
        tls: { insecure: true }
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: otel-collector, namespace: tracing }
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:latest
          args: ["--config=/conf/config.yaml"]
          volumeMounts: [{ name: conf, mountPath: /conf }]
      volumes:
        - name: conf
          configMap: { name: otel-collector-config }
