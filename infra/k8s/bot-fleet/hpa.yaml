apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bot-fleet
  namespace: trade-eval
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bot-fleet
  minReplicas: 0
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
