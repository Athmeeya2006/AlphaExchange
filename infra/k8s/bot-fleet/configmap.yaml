apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-fleet-config
  namespace: trade-eval
data:
  KAFKA_BROKERS: "kafka:9092"
  ORCHESTRATOR_EVENTS_TOPIC: "orchestrator-events"
  BOT_TELEMETRY_TOPIC: "bot-telemetry"
  CONSUMER_GROUP_ID: "bot-fleet-workers"
  MAX_BOTS_PER_POD: "200"
  BOT_REQUEST_TIMEOUT_MS: "5000"
  METRICS_PORT: "8082"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
