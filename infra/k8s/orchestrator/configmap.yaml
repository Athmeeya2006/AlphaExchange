apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: trade-eval
data:
  KAFKA_BROKERS: "kafka:9092"
  ORCHESTRATOR_EVENTS_TOPIC: "orchestrator-events"
  BOT_FLEET_TOPIC: "orchestrator-events"
  REDIS_URL: "redis:6379"
  HEARTBEAT_INTERVAL_SECONDS: "10"
  ORPHAN_DETECTION_INTERVAL_SECONDS: "60"
  AUTO_TRIGGER_TESTS: "false"
  TEST_DEFAULT_DURATION_SECONDS: "300"
  TEST_DEFAULT_BOT_COUNT: "500"
  HEALTH_PORT: "8082"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
