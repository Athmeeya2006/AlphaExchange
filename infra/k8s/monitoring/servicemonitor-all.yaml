apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: bot-fleet, namespace: trade-eval, labels: { release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app: bot-fleet } }
  endpoints: [{ port: metrics, interval: 15s }]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: telemetry-ingester, namespace: trade-eval, labels: { release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app: telemetry-ingester } }
  endpoints: [{ port: http, interval: 15s }]
