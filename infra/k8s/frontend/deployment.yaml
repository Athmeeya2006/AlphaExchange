apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: trade-eval, labels: { app: frontend } }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/trade-eval/frontend:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
          readinessProbe: { httpGet: { path: /, port: 80 }, periodSeconds: 5 }
