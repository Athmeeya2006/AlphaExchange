apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: leaderboard-api, namespace: trade-eval }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: leaderboard-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
