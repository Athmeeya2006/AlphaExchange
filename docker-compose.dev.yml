# Lightweight dev stack — infrastructure only.
# Run services locally with: cd services/<name> && go run .
# Requires .env.dev file with localhost-based connection strings.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml up kafka-init minio-init

services:

  # ── Kafka (KRaft mode — no Zookeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trade-eval-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - trade-eval-net

  # ── Kafka Init (one-shot topic creation) ───────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trade-eval-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command: >
      /bin/bash -c "
        echo 'Waiting for Kafka to be ready...'
        kafka-topics.sh --bootstrap-server kafka:9092 --list

        echo 'Creating topics...'
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic submissions --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic build-jobs --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic orchestrator-events --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bot-telemetry --partitions 16 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic leaderboard-updates --partitions 2 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic telemetry-anomalies --partitions 2 --replication-factor 1

        echo 'All topics created.'
        kafka-topics.sh --bootstrap-server kafka:9092 --list
      "
    networks:
      - trade-eval-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: trade-eval-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - trade-eval-net

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: trade-eval-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data
    networks:
      - trade-eval-net

  # ── MinIO Init (one-shot bucket creation) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: trade-eval-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    command: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/submissions
        echo 'MinIO bucket created.'
      "
    networks:
      - trade-eval-net

  # ── TimescaleDB (telemetry + time-series data) ────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trade-eval-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeeval
    command: postgres -c shared_preload_libraries=timescaledb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeeval"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - trade-eval-net

  # ── Postgres (orchestrator state DB) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trade-eval-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - trade-eval-net

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  trade-eval-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
  redis-data:
  minio-data:
  timescaledb-data:
  postgres-data:
