name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet:
    name: Go vet
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: go vet
        run: |
          for d in services/*/; do
            [ -f "$d/go.mod" ] || continue
            echo "vet $d"
            (cd "$d" && go vet ./...)
          done

  test-go:
    name: Go tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - submission-api
          - build-worker
          - orchestrator
          - bot-fleet
          - telemetry-ingester
          - leaderboard-api
          - shadow-orderbook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: test
        run: cd services/${{ matrix.service }} && go test ./...

  test-frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install
        run: cd frontend && npm ci
      - name: type-check
        run: cd frontend && npm run type-check
      - name: test
        run: cd frontend && npm test -- --run
      - name: build
        run: cd frontend && npm run build

  build-images:
    name: Build and push images
    needs: [vet, test-go, test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          sha=$(git rev-parse --short HEAD)
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for svc in submission-api build-worker orchestrator bot-fleet telemetry-ingester leaderboard-api; do
            docker build -t ghcr.io/$owner/$svc:$sha services/$svc
            docker push ghcr.io/$owner/$svc:$sha
          done
          docker build -t ghcr.io/$owner/frontend:$sha frontend
          docker push ghcr.io/$owner/frontend:$sha
