name: "Security Scan"
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  trivy-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          for svc in submission-api build-worker orchestrator bot-fleet telemetry-ingester leaderboard-api; do
            docker build -t trade-eval/$svc:scan services/$svc
          done
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: trade-eval/submission-api:scan
          severity: HIGH,CRITICAL

  gosec-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest || true
          for d in services/*/; do (cd "$d" && gosec ./... || true); done

  dependency-audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: for d in services/*/; do (cd "$d" && go mod verify); done
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm audit --audit-level=high || true
